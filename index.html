<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Árbol de Habilidades - Gremios</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ========== VARIABLES CSS MODO CLARO/OSCURO ========== */
    :root {
      --bg-body: #f1f5f9;
      --bg-sidebar: #ffffff;
      --border-sidebar: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --bg-guild-item: #f8fafc;
      --bg-guild-item-hover: #e5e7eb;
      --bg-guild-active: #3b82f6;
      --bg-card: #ffffff;
      --border-card: #e2e8f0;
      --shadow: rgba(0,0,0,0.1);
      --tooltip-bg: #1e293b;
      --tooltip-text: #ffffff;
      --icon-bg: #f1f5f9;
      --line-color: #64748b;
      --button-bg: #e2e8f0;
      --button-text: #0f172a;
      --modal-bg: #ffffff;
      --input-border: #cbd5e1;
      --tree-bg: #ffffff80;
    }

    body.dark-mode {
      --bg-body: #0f172a;
      --bg-sidebar: #1e293b;
      --border-sidebar: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --bg-guild-item: #334155;
      --bg-guild-item-hover: #475569;
      --bg-guild-active: #2563eb;
      --bg-card: #1e293b;
      --border-card: #334155;
      --shadow: rgba(0,0,0,0.3);
      --tooltip-bg: #f1f5f9;
      --tooltip-text: #0f172a;
      --icon-bg: #334155;
      --line-color: #94a3b8;
      --button-bg: #334155;
      --button-text: #f1f5f9;
      --modal-bg: #1e293b;
      --input-border: #475569;
      --tree-bg: #1e293b80;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', 'Inter', sans-serif; }
    body { background: var(--bg-body); height: 100vh; display: flex; overflow: hidden; transition: background 0.2s, color 0.2s; }
    .sidebar { width: 280px; background: var(--bg-sidebar); border-right: 1px solid var(--border-sidebar); display: flex; flex-direction: column; padding: 1.5rem; gap: 1rem; overflow-y: auto; z-index: 10; }
    .sidebar h2 { font-size: 1.3rem; color: var(--text-primary); }
    .search-box { padding: 0.5rem; border: 1px solid var(--input-border); border-radius: 0.75rem; width: 100%; background: var(--bg-card); color: var(--text-primary); }
    .guild-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; flex: 1; overflow-y: auto; }
    .guild-item { padding: 0.75rem; background: var(--bg-guild-item); border-radius: 0.75rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: var(--text-primary); }
    .guild-item.active { background: var(--bg-guild-active); color: white; }
    .delete-guild-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1.2rem; display: none; }
    .admin-mode .delete-guild-btn { display: inline-block; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 1.5rem; }
    .top-bar { display: flex; justify-content: flex-end; gap: 1rem; margin-bottom: 1rem; }
    .role-btn, .theme-btn { padding: 0.5rem 1rem; border: none; border-radius: 2rem; font-weight: 600; cursor: pointer; background: var(--button-bg); color: var(--button-text); }
    .role-btn.admin-active { background: #8b5cf6; color: white; }
    .role-btn.editor-active { background: #3b82f6; color: white; }
    .guild-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .guild-title { font-size: 1.8rem; font-weight: bold; background: linear-gradient(135deg, #1e293b, #3b82f6); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .tree-container { position: relative; background: var(--tree-bg); border-radius: 2rem; padding: 1rem; overflow: auto; flex: 1; min-height: 0; }
    .tree-canvas { position: relative; min-height: 600px; }
    .skill-node { position: absolute; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.1s; z-index: 5; }
    .skill-node img { width: 70px; height: 70px; object-fit: contain; background: var(--icon-bg); border-radius: 16px; padding: 8px; box-shadow: 0 4px 8px var(--shadow); }
    .skill-node.locked img { filter: grayscale(1) brightness(0.6); }
    .skill-node span { margin-top: 8px; font-size: 0.75rem; font-weight: 500; background: var(--button-bg); padding: 4px 10px; border-radius: 20px; max-width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
    .skill-node .tooltip { visibility: hidden; background-color: var(--tooltip-bg); color: var(--tooltip-text); text-align: center; border-radius: 8px; padding: 8px 12px; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); white-space: normal; min-width: 180px; max-width: 250px; font-size: 0.75rem; margin-bottom: 8px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 10; box-shadow: 0 2px 5px var(--shadow); }
    .skill-node:hover .tooltip { visibility: visible; opacity: 1; }
    .tooltip-desc { display: block; margin: 4px 0; }
    .node-admin-controls { position: absolute; top: -10px; right: -10px; background: var(--bg-card); border-radius: 20px; padding: 2px 6px; display: flex; gap: 4px; box-shadow: 0 1px 3px var(--shadow); }
    .node-admin-controls button { background: none; border: none; cursor: pointer; font-size: 0.7rem; color: var(--text-primary); }
    .order-controls { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: var(--bg-card); padding: 2px 6px; border-radius: 20px; box-shadow: 0 1px 2px var(--shadow); }
    .order-controls button { background: none; border: none; cursor: pointer; font-size: 0.7rem; padding: 2px 4px; color: var(--text-primary); }
    svg.lines-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    .add-skill-btn, .add-guild-btn { background: #10b981; color: white; border: none; padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer; font-weight: bold; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: var(--modal-bg); padding: 2rem; border-radius: 1.5rem; width: 450px; max-width: 90%; color: var(--text-primary); }
    .modal-content input, .modal-content textarea, .modal-content select { width: 100%; margin: 0.5rem 0; padding: 0.5rem; border-radius: 0.5rem; border: 1px solid var(--input-border); background: var(--bg-card); color: var(--text-primary); }
    .modal-content textarea { min-height: 80px; }
    .modal-content label { font-weight: 500; }
    .hidden { display: none; }
    @media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; max-height: 40%; } .skill-node img { width: 50px; height: 50px; } }
  </style>
</head>
<body class="dark-mode">

<div class="sidebar">
  <h2>🏰 Gremios</h2>
  <input type="text" id="searchGuild" class="search-box" placeholder="Buscar gremio...">
  <ul id="guildList" class="guild-list"></ul>
  <button id="addGuildBtn" class="add-guild-btn hidden">+ Nuevo gremio</button>
</div>

<div class="main">
  <div class="top-bar">
    <button id="themeToggleBtn" class="theme-btn">☀️ Modo Claro</button>
    <button id="editorModeBtn" class="role-btn">📝 Modo Editor</button>
    <button id="adminModeBtn" class="role-btn">👑 Modo Admin</button>
  </div>
  <div class="guild-header">
    <h1 id="currentGuildName" class="guild-title">Selecciona un gremio</h1>
    <div>
      <button id="newSkillBtn" class="add-skill-btn hidden">➕ Nueva habilidad</button>
      <div id="adminGuildActions" class="hidden" style="display: inline-block; margin-left: 0.5rem;">
        <input type="text" id="editGuildNameInput" placeholder="Nuevo nombre" style="width: 150px;">
        <button id="saveGuildNameBtn">Renombrar</button>
      </div>
    </div>
  </div>
  <div id="treeContainer" class="tree-container">
    <div id="treeCanvas" class="tree-canvas"></div>
  </div>
</div>

<script>
  // ========== CONFIGURACIÓN SUPABASE ==========
  const SUPABASE_URL = 'https://ssbzppeqjwftczjpgnrj.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_8wwbu9Jbo0DXeNKIrS0doQ_GPnJAWXp';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ========== MODO OSCURO ==========
  function initTheme() {
    const storedTheme = localStorage.getItem('theme');
    if (storedTheme === 'light') {
      document.body.classList.remove('dark-mode');
      document.getElementById('themeToggleBtn').innerHTML = '🌙 Modo Oscuro';
    } else {
      document.body.classList.add('dark-mode');
      document.getElementById('themeToggleBtn').innerHTML = '☀️ Modo Claro';
    }
  }
  function toggleTheme() {
    if (document.body.classList.contains('dark-mode')) {
      document.body.classList.remove('dark-mode');
      localStorage.setItem('theme', 'light');
      document.getElementById('themeToggleBtn').innerHTML = '🌙 Modo Oscuro';
    } else {
      document.body.classList.add('dark-mode');
      localStorage.setItem('theme', 'dark');
      document.getElementById('themeToggleBtn').innerHTML = '☀️ Modo Claro';
    }
    if (currentGuildId) renderTree(currentGuildId);
  }
  document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);

  // ========== VARIABLES GLOBALES ==========
  let currentRole = 'public';
  let currentGuildId = null;
  let allGuilds = [];
  let allSkills = [];
  let guildSkills = [];

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // ========== CARGAR DATOS ==========
  async function loadAllData() {
    window.addEventListener('resize', () => {
      if (currentGuildId) renderTree(currentGuildId);
    });
    const [guildsRes, skillsRes, guildSkillsRes] = await Promise.all([
      supabaseClient.from('guilds').select('*').order('name'),
      supabaseClient.from('skills').select('*').order('position', { ascending: true }),
      supabaseClient.from('guild_skills').select('*')
    ]);
    if (guildsRes.error) console.error(guildsRes.error);
    if (skillsRes.error) console.error(skillsRes.error);
    if (guildSkillsRes.error) console.error(guildSkillsRes.error);
    
    allGuilds = guildsRes.data || [];
    allSkills = skillsRes.data || [];
    guildSkills = guildSkillsRes.data || [];
    
    let rootSkill = allSkills.find(s => s.name === 'Creación del Gremio');
    if (!rootSkill && currentRole === 'admin') {
      const { data: newRoot, error } = await supabaseClient.from('skills').insert({
        name: 'Creación del Gremio',
        description: 'Habilidad fundamental del gremio. Siempre desbloqueada.',
        icon_url: 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png',
        parent_id: null,
        position: 0
      }).select().single();
      if (!error && newRoot) {
        allSkills.push(newRoot);
        rootSkill = newRoot;
      }
    }
    if (rootSkill) {
      for (let guild of allGuilds) {
        const exists = guildSkills.some(gs => gs.guild_id === guild.id && gs.skill_id === rootSkill.id);
        if (!exists) {
          await supabaseClient.from('guild_skills').upsert({ guild_id: guild.id, skill_id: rootSkill.id, is_unlocked: true });
          guildSkills.push({ guild_id: guild.id, skill_id: rootSkill.id, is_unlocked: true });
        }
      }
    }
    
    renderGuildList();
    if (currentGuildId && !allGuilds.some(g => g.id === currentGuildId)) currentGuildId = null;
    if (!currentGuildId && allGuilds.length > 0) currentGuildId = allGuilds[0].id;
    if (currentGuildId) renderTree(currentGuildId);
    else document.getElementById('treeCanvas').innerHTML = '<p style="text-align:center;">No hay gremios. Crea uno como admin.</p>';
  }

  function renderGuildList() {
    const searchTerm = document.getElementById('searchGuild').value.toLowerCase();
    const filtered = allGuilds.filter(g => g.name.toLowerCase().includes(searchTerm));
    const container = document.getElementById('guildList');
    container.innerHTML = filtered.map(guild => `
      <li class="guild-item ${currentGuildId === guild.id ? 'active' : ''}" data-id="${guild.id}">
        <span class="guild-name">${escapeHtml(guild.name)}</span>
        ${currentRole === 'admin' ? `<button class="delete-guild-btn" data-id="${guild.id}">🗑️</button>` : ''}
      </li>
    `).join('');
    
    document.querySelectorAll('.guild-item').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-guild-btn')) return;
        currentGuildId = el.dataset.id;
        renderGuildList();
        renderTree(currentGuildId);
      });
    });
    
    if (currentRole === 'admin') {
      document.querySelectorAll('.delete-guild-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const guildId = btn.dataset.id;
          if (confirm('¿Eliminar gremio?')) {
            await supabaseClient.from('guilds').delete().eq('id', guildId);
            await loadAllData();
          }
        });
      });
    }
  }

  function isUnlocked(guildId, skillId) {
    const entry = guildSkills.find(gs => gs.guild_id === guildId && gs.skill_id === skillId);
    return entry ? entry.is_unlocked : false;
  }

  function canUnlock(guildId, skill) {
    if (skill.name === 'Creación del Gremio') return true;
    if (!skill.parent_id) return true;
    const parentSkill = allSkills.find(s => s.id === skill.parent_id);
    if (!parentSkill) return true;
    return isUnlocked(guildId, parentSkill.id);
  }

  // ========== POSICIONAMIENTO DEL ÁRBOL ==========
  function calculatePositions(rootSkills, startX = 400, startY = 80, levelGapX = 220, levelGapY = 130) {
    const childrenMap = new Map();
    allSkills.forEach(skill => {
      if (skill.parent_id) {
        if (!childrenMap.has(skill.parent_id)) childrenMap.set(skill.parent_id, []);
        childrenMap.get(skill.parent_id).push(skill);
      }
    });
    for (let [parent, children] of childrenMap.entries()) {
      children.sort((a,b) => (a.position || 0) - (b.position || 0));
    }
    
    const roots = allSkills.filter(s => !s.parent_id);
    if (roots.length === 0) return new Map();
    
    const positions = new Map();
    function dfs(skill, depth, offsetX) {
      const y = startY + depth * levelGapY;
      positions.set(skill.id, { x: offsetX, y });
      const children = childrenMap.get(skill.id) || [];
      const totalWidth = (children.length - 1) * levelGapX;
      let childX = offsetX - totalWidth / 2;
      for (let child of children) {
        dfs(child, depth + 1, childX);
        childX += levelGapX;
      }
      if (children.length > 0) {
        const firstChildX = positions.get(children[0].id).x;
        const lastChildX = positions.get(children[children.length-1].id).x;
        const centerX = (firstChildX + lastChildX) / 2;
        positions.set(skill.id, { x: centerX, y });
      }
    }
    
    let globalOffset = startX;
    for (let root of roots) {
      dfs(root, 0, globalOffset);
      globalOffset += 300;
    }
    return positions;
  }

  // Dibujar líneas punteadas curvas
  function drawLines(positions) {
    const oldSvg = document.querySelector('.lines-layer');
    if (oldSvg) oldSvg.remove();
    const container = document.getElementById('treeCanvas');
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.classList.add('lines-layer');
    svg.style.position = 'absolute';
    svg.style.top = 0;
    svg.style.left = 0;
    svg.style.width = '100%';
    svg.style.height = '100%';
    svg.style.pointerEvents = 'none';
    
    const parentOffset = 45;
    const childOffset = 0;
    
    for (let skill of allSkills) {
      if (!skill.parent_id) continue;
      const parentPos = positions.get(skill.parent_id);
      const childPos = positions.get(skill.id);
      if (!parentPos || !childPos) continue;
      const x1 = parentPos.x;
      const y1 = parentPos.y + parentOffset;
      const x2 = childPos.x;
      const y2 = childPos.y - childOffset;
      const dx = x2 - x1;
      const dy = y2 - y1;
      const cp1x = x1 + dx * 0.5;
      const cp1y = y1;
      const cp2x = x2 - dx * 0.5;
      const cp2y = y2;
      const d = `M ${x1} ${y1} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${x2} ${y2}`;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', d);
      path.setAttribute('stroke', 'var(--line-color)');
      path.setAttribute('stroke-width', '2');
      path.setAttribute('stroke-dasharray', '6,6');
      path.setAttribute('fill', 'none');
      svg.appendChild(path);
    }
    container.appendChild(svg);
  }

  async function renderTree(guildId) {
    if (!guildId) return;
    const guild = allGuilds.find(g => g.id === guildId);
    document.getElementById('currentGuildName').innerText = guild ? guild.name : 'Gremio';
    
    const positions = calculatePositions(allSkills.filter(s => !s.parent_id), 400, 80, 220, 130);
    if (positions.size === 0) {
      document.getElementById('treeCanvas').innerHTML = '<p>No hay habilidades. Crea una como administrador.</p>';
      return;
    }
    
    let nodesHtml = '';
    for (let skill of allSkills) {
      const pos = positions.get(skill.id);
      if (!pos) continue;
      const unlocked = isUnlocked(guildId, skill.id);
      const lockedClass = (!unlocked && skill.name !== 'Creación del Gremio') ? 'locked' : '';
      const iconUrl = skill.icon_url || 'https://cdn-icons-png.flaticon.com/512/1055/1055687.png';
      let adminButtons = '';
      if (currentRole === 'admin' && skill.name !== 'Creación del Gremio') {
        adminButtons = `<div class="node-admin-controls">
          <button class="edit-skill" data-id="${skill.id}">✏️</button>
          <button class="delete-skill" data-id="${skill.id}">🗑️</button>
        </div>`;
      }
      let orderButtons = '';
      if (currentRole === 'admin' && skill.parent_id) {
        const siblings = allSkills.filter(s => s.parent_id === skill.parent_id).sort((a,b) => (a.position||0)-(b.position||0));
        const idx = siblings.findIndex(s => s.id === skill.id);
        if (siblings.length > 1) {
          orderButtons = `<div class="order-controls">
            ${idx > 0 ? `<button class="move-up" data-id="${skill.id}">↑</button>` : ''}
            ${idx < siblings.length-1 ? `<button class="move-down" data-id="${skill.id}">↓</button>` : ''}
          </div>`;
        }
      }
      // Tooltip con soporte HTML en la descripción
      const tooltipDesc = skill.description || 'Sin descripción';
      nodesHtml += `
        <div class="skill-node ${lockedClass}" data-id="${skill.id}" style="left: ${pos.x}px; top: ${pos.y}px; transform: translateX(-50%);">
          ${adminButtons}
          <img src="${escapeHtml(iconUrl)}" alt="${escapeHtml(skill.name)}">
          <span>${escapeHtml(skill.name)}</span>
          <div class="tooltip">
            <strong>${escapeHtml(skill.name)}</strong><br>
            <span class="tooltip-desc">${tooltipDesc}</span><br>
            📜 Padre: ${skill.parent_id ? (allSkills.find(s=>s.id===skill.parent_id)?.name || 'Ninguno') : 'Ninguno'}
          </div>
          ${orderButtons}
        </div>
      `;
    }
    document.getElementById('treeCanvas').innerHTML = nodesHtml;
    drawLines(positions);
    
    // Eventos toggle (editor/admin)
    if (currentRole === 'editor' || currentRole === 'admin') {
      document.querySelectorAll('.skill-node').forEach(node => {
        const skillId = node.dataset.id;
        const skill = allSkills.find(s => s.id === skillId);
        if (skill.name === 'Creación del Gremio') return;
        node.addEventListener('click', async (e) => {
          if (e.target.closest('.node-admin-controls') || e.target.closest('.order-controls')) return;
          const currentlyUnlocked = isUnlocked(guildId, skillId);
          const newState = !currentlyUnlocked;
          if (newState && !canUnlock(guildId, skill)) {
            alert('Para desbloquear esta habilidad, primero debes desbloquear su padre.');
            return;
          }
          await supabaseClient.from('guild_skills').upsert({
            guild_id: guildId,
            skill_id: skillId,
            is_unlocked: newState
          });
          await loadAllData();
        });
      });
    }
    
    // Admin: editar, eliminar y mover
    if (currentRole === 'admin') {
      document.querySelectorAll('.edit-skill').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); openSkillModal(btn.dataset.id); });
      });
      document.querySelectorAll('.delete-skill').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const skillId = btn.dataset.id;
          const skill = allSkills.find(s => s.id === skillId);
          if (skill.name === 'Creación del Gremio') return alert('No se puede eliminar la raíz');
          if (confirm('¿Eliminar habilidad? Se eliminarán también sus descendientes.')) {
            await supabaseClient.from('skills').delete().eq('id', skillId);
            await loadAllData();
          }
        });
      });
      document.querySelectorAll('.move-up').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const skillId = btn.dataset.id;
          await moveSkill(skillId, -1);
        });
      });
      document.querySelectorAll('.move-down').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const skillId = btn.dataset.id;
          await moveSkill(skillId, 1);
        });
      });
    }
  }
  
  async function moveSkill(skillId, delta) {
    const skill = allSkills.find(s => s.id === skillId);
    if (!skill || !skill.parent_id) return;
    const siblings = allSkills.filter(s => s.parent_id === skill.parent_id).sort((a,b) => (a.position||0) - (b.position||0));
    const idx = siblings.findIndex(s => s.id === skillId);
    const newIdx = idx + delta;
    if (newIdx < 0 || newIdx >= siblings.length) return;
    const other = siblings[newIdx];
    const pos1 = skill.position || 0;
    const pos2 = other.position || 0;
    await supabaseClient.from('skills').update({ position: pos2 }).eq('id', skillId);
    await supabaseClient.from('skills').update({ position: pos1 }).eq('id', other.id);
    await loadAllData();
  }

  // ========== MODAL HABILIDAD (con soporte HTML y edición de raíz limitada) ==========
  async function openSkillModal(skillId = null) {
    const isEditing = !!skillId;
    const skill = isEditing ? allSkills.find(s => s.id === skillId) : null;
    const isRoot = skill && skill.name === 'Creación del Gremio';
    
    const possibleParents = allSkills.filter(s => {
      if (isEditing && s.id === skillId) return false;
      if (isEditing && isDescendant(s.id, skillId)) return false;
      return true;
    });
    
    const modalDiv = document.createElement('div');
    modalDiv.className = 'modal';
    modalDiv.innerHTML = `
      <div class="modal-content">
        <h3>${isEditing ? 'Editar habilidad' : 'Nueva habilidad'}</h3>
        <input type="text" id="skillName" placeholder="Nombre" value="${skill ? escapeHtml(skill.name) : ''}" ${isRoot ? 'disabled' : ''}>
        <textarea id="skillDesc" placeholder="Descripción (puedes usar HTML: &lt;b&gt;, &lt;i&gt;, etc.)">${skill ? (skill.description || '') : ''}</textarea>
        <input type="text" id="skillIconUrl" placeholder="URL del icono" value="${skill ? escapeHtml(skill.icon_url || '') : ''}">
        <label>Habilidad padre (prerrequisito):</label>
        <select id="parentSelect" ${isRoot ? 'disabled' : ''}>
          <option value="">-- Ninguno (solo raíz) --</option>
          ${possibleParents.map(s => `<option value="${s.id}" ${skill && skill.parent_id === s.id ? 'selected' : ''}>${escapeHtml(s.name)}</option>`).join('')}
        </select>
        <button id="saveSkillBtn">Guardar</button>
        <button id="closeModalBtn">Cancelar</button>
      </div>
    `;
    document.body.appendChild(modalDiv);
    document.getElementById('closeModalBtn').onclick = () => modalDiv.remove();
    document.getElementById('saveSkillBtn').onclick = async () => {
      const name = document.getElementById('skillName').value.trim();
      const desc = document.getElementById('skillDesc').value;
      const iconUrl = document.getElementById('skillIconUrl').value.trim();
      const parentId = document.getElementById('parentSelect').value || null;
      if (!name && !isRoot) return alert('El nombre es obligatorio');
      if (isEditing) {
        const updateData = { description: desc, icon_url: iconUrl || null };
        if (!isRoot) {
          updateData.name = name;
          updateData.parent_id = parentId;
        }
        await supabaseClient.from('skills').update(updateData).eq('id', skillId);
      } else {
        let newPosition = 0;
        if (parentId) {
          const siblings = allSkills.filter(s => s.parent_id === parentId);
          newPosition = siblings.length;
        }
        const { error } = await supabaseClient.from('skills').insert({ name, description: desc, icon_url: iconUrl || null, parent_id: parentId, position: newPosition });
        if (error) alert(error.message);
      }
      modalDiv.remove();
      await loadAllData();
    };
  }
  
  function isDescendant(possibleAncestorId, skillId) {
    let current = allSkills.find(s => s.id === possibleAncestorId);
    while (current && current.parent_id) {
      if (current.parent_id === skillId) return true;
      current = allSkills.find(s => s.id === current.parent_id);
    }
    return false;
  }

  async function createGuild() {
    if (currentRole !== 'admin') return alert('Solo admin');
    const name = prompt('Nombre del gremio:');
    if (!name) return;
    const { data: newGuild, error } = await supabaseClient.from('guilds').insert({ name }).select().single();
    if (error) alert(error.message);
    else {
      const rootSkill = allSkills.find(s => s.name === 'Creación del Gremio');
      if (rootSkill) await supabaseClient.from('guild_skills').upsert({ guild_id: newGuild.id, skill_id: rootSkill.id, is_unlocked: true });
      await loadAllData();
    }
  }

  // ========== AUTENTICACIÓN ==========
  async function authenticate(role) {
    const password = prompt(`Contraseña de ${role === 'admin' ? 'Administrador' : 'Editor'}:`);
    if (!password) return false;
    const { data, error } = await supabaseClient.from('app_secrets').select('value').eq('key', `${role}_password`).single();
    if (error || !data) { alert('Error'); return false; }
    if (password === data.value) {
      currentRole = role;
      document.getElementById('adminModeBtn').classList.toggle('admin-active', role === 'admin');
      document.getElementById('editorModeBtn').classList.toggle('editor-active', role === 'editor');
      document.body.classList.remove('admin-mode', 'editor-mode');
      if (role === 'admin') document.body.classList.add('admin-mode');
      const addGuildBtn = document.getElementById('addGuildBtn');
      const newSkillBtn = document.getElementById('newSkillBtn');
      const adminActions = document.getElementById('adminGuildActions');
      if (role === 'admin') {
        addGuildBtn.classList.remove('hidden');
        newSkillBtn.classList.remove('hidden');
        adminActions.classList.remove('hidden');
      } else {
        addGuildBtn.classList.add('hidden');
        newSkillBtn.classList.add('hidden');
        adminActions.classList.add('hidden');
      }
      await loadAllData();
      return true;
    } else {
      alert('Contraseña incorrecta');
      return false;
    }
  }

  // ========== EVENTOS ==========
  document.getElementById('editorModeBtn').addEventListener('click', () => authenticate('editor'));
  document.getElementById('adminModeBtn').addEventListener('click', () => authenticate('admin'));
  document.getElementById('addGuildBtn').addEventListener('click', createGuild);
  document.getElementById('newSkillBtn').addEventListener('click', () => openSkillModal(null));
  document.getElementById('saveGuildNameBtn').addEventListener('click', async () => {
    if (currentRole !== 'admin') return alert('Solo admin');
    const newName = document.getElementById('editGuildNameInput').value.trim();
    if (!newName || !currentGuildId) return;
    await supabaseClient.from('guilds').update({ name: newName }).eq('id', currentGuildId);
    await loadAllData();
    document.getElementById('editGuildNameInput').value = '';
  });
  document.getElementById('searchGuild').addEventListener('input', () => renderGuildList());

  initTheme();
  loadAllData();
</script>
</body>
</html>
